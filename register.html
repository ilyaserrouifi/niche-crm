<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Niche CRM — Inscription</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-deep: #0b0b0e;
      --blue-primary: #2b2fff;
      --blue-hover: #4f5aff;
      --blue-glow: rgba(43, 47, 255, 0.35);
      --surface-card: rgba(255, 255, 255, 0.04);
      --border-subtle: rgba(255, 255, 255, 0.07);
      --text-primary: #ededf2;
      --text-muted: rgba(237, 237, 242, 0.4);
      --error-red: #ef4444;
      --success-green: #10b981;
      --transition: all 0.2s ease;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 1.5rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
      z-index: 0;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 520px; height: 520px; background: rgba(43, 47, 255, 0.13); top: -140px; left: -140px; }
    .blob-2 { width: 380px; height: 380px; background: rgba(43, 47, 255, 0.08); bottom: -80px; right: -80px; }
    .blob-3 { width: 220px; height: 220px; background: rgba(43, 47, 255, 0.07); top: 50%; left: 55%; transform: translate(-50%, -50%); }

    .register-card {
      background: var(--surface-card);
      border: 1px solid var(--border-subtle);
      border-radius: 24px;
      padding: 48px 40px;
      backdrop-filter: blur(28px);
      width: 100%;
      max-width: 580px;
      max-height: 85vh;
      overflow-y: auto;
      animation: fadeUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .register-card::-webkit-scrollbar { width: 4px; }
    .register-card::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
    .register-card::-webkit-scrollbar-thumb { background: var(--blue-primary); border-radius: 4px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 36px;
      text-align: center;
    }
    .logo-text .name { font-size: 20px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.3px; }
    .logo-text .sub { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text-muted); margin-top: 4px; }

    h1 { font-size: 27px; font-weight: 600; letter-spacing: -0.6px; margin-bottom: 6px; text-align: center; }
    .tagline { color: var(--text-muted); font-size: 13.5px; margin-bottom: 32px; text-align: center; }

    .two-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .field { margin-bottom: 18px; }
    .field-full { grid-column: span 2; }
    label { display: block; font-size: 11px; font-weight: 500; color: var(--text-muted); margin-bottom: 7px; letter-spacing: 0.5px; text-transform: uppercase; }
    input, select, textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.042);
      border: 1px solid var(--border-subtle);
      border-radius: 11px;
      padding: 12px 15px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: rgba(43, 47, 255, 0.55);
      box-shadow: 0 0 0 3px rgba(43, 47, 255, 0.1);
    }
    input::placeholder { color: rgba(255, 255, 255, 0.17); }

    .password-wrapper { position: relative; }
    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--text-muted);
      font-size: 16px;
    }
    .password-toggle:hover { color: var(--blue-primary); }

    .avatar-upload {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.03);
      padding: 16px;
      border-radius: 16px;
      border: 1px dashed var(--border-subtle);
    }
    .avatar-preview {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--blue-primary), #7c3aed);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
    }
    .avatar-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .avatar-preview .avatar-placeholder {
      font-size: 32px;
      font-weight: 600;
      color: white;
    }
    .avatar-preview:hover::after {
      content: '📷';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      border-radius: 50%;
    }
    .avatar-input {
      flex: 1;
    }
    .avatar-input input {
      margin-top: 8px;
      padding: 10px;
      font-size: 13px;
    }
    .avatar-hint {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .error-msg { color: var(--error-red); font-size: 12px; margin-bottom: 16px; text-align: center; display: none; }
    .success-msg { color: var(--success-green); font-size: 12px; margin-bottom: 16px; text-align: center; display: none; }
    .error-msg.visible, .success-msg.visible { display: block; }

    .btn {
      width: 100%;
      padding: 13.5px;
      background: var(--blue-primary);
      border: none;
      border-radius: 11px;
      color: white;
      font-size: 14.5px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 0 30px var(--blue-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }
    .btn:hover:not(:disabled) { background: var(--blue-hover); transform: translateY(-1px); }
    .btn:disabled { background: rgba(43, 47, 255, 0.5); cursor: not-allowed; }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border-subtle);
      box-shadow: none;
      margin-top: 12px;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.05); transform: translateY(-1px); }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .footer { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 24px; }
    .footer a { color: var(--blue-primary); text-decoration: none; }

    @media (max-width: 600px) {
      .register-card { padding: 32px 24px; }
      .two-columns { grid-template-columns: 1fr; }
      .field-full { grid-column: span 1; }
      h1 { font-size: 24px; }
      .avatar-upload { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="register-card">
  <div class="logo-section">
    <div style="width: 110px; height: 110px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0;">
      <img src="/assets/logo-niche.png" alt="Logo" style="width: 96px; height: 96px; object-fit: contain;">
    </div>
    <div class="logo-text">
      <div class="name">Niche</div>
      <div class="sub">CRM PLATFORM</div>
    </div>
  </div>

  <h1>Create account</h1>
  <p class="tagline">Sign up to get started</p>

  <form id="registerForm" enctype="multipart/form-data">
    <!-- Avatar / Photo de profil avec upload d'image -->
    <div class="avatar-upload">
      <div class="avatar-preview" id="avatarPreview" onclick="document.getElementById('avatarFile').click()">
        <div class="avatar-placeholder" id="avatarPlaceholder">👤</div>
        <img id="avatarImage" style="display: none;">
      </div>
      <div class="avatar-input">
        <label>PROFILE PHOTO</label>
        <input type="file" id="avatarFile" accept="image/jpeg,image/png,image/jpg,image/gif" style="display: none;">
        <input type="text" id="avatarInitials" placeholder="Or enter initials (e.g., JD)" maxlength="2">
        <div class="avatar-hint">Click on the circle to upload a photo, or enter initials</div>
      </div>
    </div>

    <div class="two-columns">
      <div class="field">
        <label>FULL NAME *</label>
        <input type="text" id="fullName" placeholder="John Doe" required>
      </div>
      <div class="field">
        <label>USERNAME *</label>
        <input type="text" id="username" placeholder="johndoe" required>
      </div>
    </div>

    <div class="two-columns">
      <div class="field">
        <label>EMAIL ADDRESS *</label>
        <input type="email" id="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label>PHONE *</label>
        <input type="tel" id="phone" placeholder="+212600000000" required>
      </div>
    </div>

    <div class="two-columns">
      <div class="field">
        <label>COUNTRY</label>
        <select id="country">
          <option value="">Select country</option>
          <option value="Morocco">Morocco</option>
          <option value="France">France</option>
          <option value="USA">USA</option>
          <option value="Canada">Canada</option>
          <option value="UK">UK</option>
          <option value="Germany">Germany</option>
          <option value="Spain">Spain</option>
          <option value="Italy">Italy</option>
          <option value="UAE">UAE</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="field">
        <label>CITY</label>
        <input type="text" id="city" placeholder="Casablanca">
      </div>
    </div>

    <div class="field field-full">
      <label>ADDRESS</label>
      <input type="text" id="address" placeholder="Street, building, apartment">
    </div>

    <div class="two-columns">
      <div class="field">
        <label>ROLE *</label>
        <select id="role" required>
          <option value="client">Client</option>
          <option value="freelancer">Freelancer</option>
          <option value="caller">Cold Caller</option>
          <option value="outreacher">Outreacher</option>
        </select>
      </div>
      <div class="field">
        <label>SPECIALIZATION (Freelancer only)</label>
        <input type="text" id="specialization" placeholder="Design / Dev / SEO / Ads">
      </div>
    </div>

    <div class="field field-full">
      <label>BIO / ABOUT</label>
      <textarea id="bio" rows="3" placeholder="Tell us about yourself..."></textarea>
    </div>

    <div class="two-columns">
      <div class="field">
        <label>PASSWORD *</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="••••••••" required>
          <span class="password-toggle" id="togglePassword">👁️</span>
        </div>
      </div>
      <div class="field">
        <label>CONFIRM PASSWORD *</label>
        <div class="password-wrapper">
          <input type="password" id="confirmPassword" placeholder="••••••••" required>
        </div>
      </div>
    </div>

    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>

    <button type="submit" class="btn" id="registerBtn">
      <span>Create account</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <button type="button" class="btn btn-secondary" onclick="window.location.href='/login.html'">
      Already have an account? Sign in
    </button>

    <div class="footer">
      By signing up, you agree to our <a href="#">Terms of Service</a>
    </div>
  </form>
</div>

<script>
  let selectedAvatarFile = null;
  let avatarBase64 = null;

  const togglePassword = document.getElementById('togglePassword');
  const passwordInput = document.getElementById('password');
  const registerBtn = document.getElementById('registerBtn');
  const spinner = document.getElementById('spinner');
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  const avatarInitials = document.getElementById('avatarInitials');
  const avatarPreview = document.getElementById('avatarPreview');
  const avatarPlaceholder = document.getElementById('avatarPlaceholder');
  const avatarImage = document.getElementById('avatarImage');
  const avatarFile = document.getElementById('avatarFile');

  // Preview image when file selected
  avatarFile.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      selectedAvatarFile = file;
      const reader = new FileReader();
      reader.onload = function(event) {
        avatarBase64 = event.target.result;
        avatarImage.src = avatarBase64;
        avatarImage.style.display = 'block';
        avatarPlaceholder.style.display = 'none';
      };
      reader.readAsDataURL(file);
    }
  });

  // Update avatar preview with initials (when no image)
  avatarInitials.addEventListener('input', () => {
    const val = avatarInitials.value.trim().toUpperCase();
    if (val && !selectedAvatarFile) {
      avatarPlaceholder.textContent = val.substring(0, 2);
      avatarPlaceholder.style.display = 'flex';
      avatarImage.style.display = 'none';
      avatarBase64 = null;
    } else if (!selectedAvatarFile) {
      avatarPlaceholder.textContent = '👤';
      avatarPlaceholder.style.display = 'flex';
      avatarImage.style.display = 'none';
    }
  });

  // Toggle password visibility
  togglePassword.addEventListener('click', () => {
    const type = passwordInput.type === 'password' ? 'text' : 'password';
    passwordInput.type = type;
    togglePassword.textContent = type === 'password' ? '👁️' : '🙈';
  });

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const fullName = document.getElementById('fullName').value.trim();
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const country = document.getElementById('country').value;
    const city = document.getElementById('city').value.trim();
    const address = document.getElementById('address').value.trim();
    const role = document.getElementById('role').value;
    const specialization = document.getElementById('specialization').value.trim();
    const bio = document.getElementById('bio').value.trim();
    const avatar = avatarInitials.value.trim().toUpperCase() || fullName.substring(0,2).toUpperCase();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (!fullName || !username || !email || !phone || !password) {
      errorMsg.textContent = 'Please fill all required fields (*).';
      errorMsg.classList.add('visible');
      return;
    }

    if (password !== confirmPassword) {
      errorMsg.textContent = 'Passwords do not match.';
      errorMsg.classList.add('visible');
      return;
    }

    if (password.length < 6) {
      errorMsg.textContent = 'Password must be at least 6 characters.';
      errorMsg.classList.add('visible');
      return;
    }

    registerBtn.disabled = true;
    registerBtn.querySelector('span').style.opacity = '0.5';
    spinner.style.display = 'inline-block';
    errorMsg.classList.remove('visible');
    successMsg.classList.remove('visible');

    // Prepare form data with avatar image
    const formData = new FormData();
    formData.append('full_name', fullName);
    formData.append('username', username);
    formData.append('email', email);
    formData.append('phone', phone);
    formData.append('country', country);
    formData.append('city', city);
    formData.append('address', address);
    formData.append('role', role);
    formData.append('specialization', specialization);
    formData.append('bio', bio);
    formData.append('avatar_initials', avatar);
    formData.append('password_hash', password);
    
    if (selectedAvatarFile) {
      formData.append('avatar_image', selectedAvatarFile);
    } else if (avatarBase64) {
      formData.append('avatar_base64', avatarBase64);
    }

    try {
      const response = await fetch('/api/auth/register', {
        method: 'POST',
        body: formData
      });

      const data = await response.json();

      if (response.ok && data.success) {
        // Store user data in localStorage
        if (data.token) localStorage.setItem('niche_token', data.token);
        if (data.role) localStorage.setItem('niche_role', data.role);
        if (data.name) localStorage.setItem('niche_name', data.name);
        if (data.email) localStorage.setItem('niche_email', data.email);
        if (data.avatar) localStorage.setItem('niche_avatar', data.avatar);
        
        successMsg.textContent = '✓ Account created successfully! Redirecting to dashboard...';
        successMsg.classList.add('visible');
        setTimeout(() => { 
          window.location.href = '/index.html';
        }, 1500);
      } else {
        errorMsg.textContent = data.message || 'Registration failed. Email may already exist.';
        errorMsg.classList.add('visible');
        registerBtn.disabled = false;
        registerBtn.querySelector('span').style.opacity = '1';
        spinner.style.display = 'none';
      }
    } catch (error) {
      console.error('Registration error:', error);
      errorMsg.textContent = 'Connection error. Please try again.';
      errorMsg.classList.add('visible');
      registerBtn.disabled = false;
      registerBtn.querySelector('span').style.opacity = '1';
      spinner.style.display = 'none';
    }
  });
</script>
</body>
</html>
