<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal - Niche CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #0b0b0e;
            color: #ededf2;
        }
        .header { background: rgba(255,255,255,0.04); padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.07); }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: rgba(255,255,255,0.04); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.07); }
        .stat-value { font-size: 32px; font-weight: 700; color: #2b2fff; }
        .stat-label { font-size: 12px; color: rgba(237,237,242,0.4); margin-top: 8px; }
        .projects-list { background: rgba(255,255,255,0.04); border-radius: 20px; padding: 20px; }
        .project-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.07); }
        .progress-bar { width: 200px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: #2b2fff; width: 0%; }
        .btn { background: #2b2fff; border: none; padding: 12px 24px; border-radius: 10px; color: white; cursor: pointer; }
        .btn-logout { background: rgba(239,68,68,0.2); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏢 Client Portal</h1>
        <button class="btn btn-logout" id="logoutBtn" style="position: absolute; top: 20px; right: 20px;">Logout</button>
    </div>
    <div class="container">
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value" id="activeProjects">0</div><div class="stat-label">Active Projects</div></div>
            <div class="stat-card"><div class="stat-value" id="completedTasks">0</div><div class="stat-label">Completed Tasks</div></div>
            <div class="stat-card"><div class="stat-value" id="totalSpent">$0</div><div class="stat-label">Total Spent</div></div>
        </div>
        <div class="projects-list">
            <h3>📁 Your Projects</h3>
            <div id="projectsContainer"></div>
        </div>
    </div>
    <script>
        if (!localStorage.getItem('niche_token')) window.location.href = '/login.html';
        
        async function loadClientData() {
            const token = localStorage.getItem('niche_token');
            const headers = { 'Authorization': `Bearer ${token}` };
            try {
                const projects = await fetch('/api/projects', { headers }).then(r => r.json());
                document.getElementById('activeProjects').innerText = projects.filter(p => p.status === 'active').length;
                document.getElementById('projectsContainer').innerHTML = projects.map(p => `
                    <div class="project-item">
                        <div><strong>${p.project_name}</strong><br><small>${p.status || 'active'}</small></div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${p.progress || 0}%"></div></div>
                        <div>${p.progress || 0}%</div>
                    </div>
                `).join('');
            } catch(e) { console.error(e); }
        }
        
        document.getElementById('logoutBtn').onclick = () => { localStorage.clear(); window.location.href = '/login.html'; };
        loadClientData();
    </script>
</body>
</html>
